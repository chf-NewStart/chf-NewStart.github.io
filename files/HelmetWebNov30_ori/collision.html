<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collision Time Display</title>
  <style>
    body, html {
      font-family: Arial, sans-serif;
      height: 100%;
      margin: 0;
    }

    .bg-image {
      background-image: url('E-1119400-B20AE3D3XZ.jpg');
      background-image: url('collision_background.jpg');
      filter: blur(1px);
      -webkit-filter: blur(1px);
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }
    .content {
      background-color: rgba(255, 255, 255, 0.3);
      color: black;
      font-weight: bold;
      border: 0.5px solid #f1f1f1;
      border-radius: 50px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 40%;
      padding: 20px;
      text-align: center;
    }
  </style>
  <script type="text/javascript">
    var conn;
    function initWebSocket() {
      conn = new WebSocket('ws://192.168.137.64:81');
      conn.onopen = function() {
        console.log('连接开启');
      };
      conn.onmessage = function(e) {
        console.log('收到消息: ' + e.data);
        document.getElementById('dataContainer').innerText = e.data;
      };
      conn.onerror = function(e) {
        console.log('WebSocket错误: ' + e);
      };
      conn.onclose = function() {
        console.log('连接关闭，尝试重新连接');
        setTimeout(initWebSocket, 2000);
      };
    }
    window.addEventListener('load', initWebSocket, false);
  </script>
</head>
<body>
<div class="bg-image"></div>
<div class="content">
  <h1>Last Collision</h1>
  <p id="dataContainer">Time of the last collision will be displayed here.</p>
</div>
</body>
</html>
