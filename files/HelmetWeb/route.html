<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e7e7e7;
        }

        header {
            background-color: #3d2d9e;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }

        nav ul li {
            display: inline;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: #3d2d9e;
        }

        main {
            padding: 15px;
        }

        footer {
            position: fixed; /* Fixed position */
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: #3d2d9e;
            color: white;
            text-align: center;
            padding: 10px 0;
        }

        /* Fade in animation */
        @keyframes fadeIn {
        from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Apply the animation to your main content */
        main {
            animation: fadeIn 1s ease-in-out;
        }
    </style>
    <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?libraries=visualization"></script>
    <script type="text/javascript">
        function initialize() {
            var map = new google.maps.Map(document.getElementById("map_canvas"), {
                zoom: 13,
                center: new google.maps.LatLng(30.335838, 77.870192)
            });

            new google.maps.Polyline({
                clickable: false,
                geodesic: true,
                strokeColor: "#6495ED",
                strokeOpacity: 1.000000,
                strokeWeight: 2,
                map: map,
                path: [
                    new google.maps.LatLng(30.335838, 77.870192),
                    new google.maps.LatLng(30.307977, 78.048457),
                    new google.maps.LatLng(30.321642, 78.041309),
                    new google.maps.LatLng(30.335838, 77.920192),
                    new google.maps.LatLng(30.335838, 78.041309),
                ]
            });
        }

        function loadContent(url, elementId) {
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error('Error:', error));
        }

        // Load dynamic content after the page has loaded
        window.onload = function() {
            initialize();
            loadContent('http://localhost:3000/index.html', 'content-placeholder');
        };
    </script>
</head>
<body>
    <header>
        <h1>Route</h1>
    </header>
    <nav>
        <ul>
            <li><a href="helmet.html">Home</a></li>
            <li><a href="video.html">Video</a></li>
            <!-- <li><a href="collision.html">Collision Detection</a></li> -->
            <li><a href="lastcolli.html">Collision Detection</a></li>
            <li><a href="story.html">Our Story</a></li>
            <li><a href="about.html">About Us</a></li>
        </ul>
    </nav>
    <main>
        <!-- Content will go here -->
        <div id="map_canvas" style="width: 100%; height: 600px;"></div>
        <div id="content-placeholder"></div>
    </main>
    <footer>
        <p>&copy; 2023 Helmet World. All rights reserved.</p>
    </footer>

</body>
</html>
